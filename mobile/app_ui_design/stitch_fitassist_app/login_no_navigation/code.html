<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#1f1f23",
              "on-error-container": "#ffdad6",
              "on-primary-container": "#00646f",
              "on-surface": "#e4e1e7",
              "primary-fixed-dim": "#00daf0",
              "on-secondary-container": "#89c2cb",
              "secondary": "#97d0d9",
              "secondary-container": "#105159",
              "surface-bright": "#39393d",
              "tertiary-container": "#ffcc34",
              "tertiary-fixed": "#ffdf92",
              "surface-variant": "#353439",
              "on-tertiary-fixed-variant": "#594400",
              "on-surface-variant": "#bac9cc",
              "on-error": "#690005",
              "inverse-surface": "#e4e1e7",
              "tertiary": "#ffedc8",
              "secondary-fixed": "#b3ecf6",
              "error": "#ffb4ab",
              "on-secondary-fixed": "#001f24",
              "on-primary-fixed-variant": "#004f57",
              "on-background": "#e4e1e7",
              "primary-fixed": "#95f1ff",
              "on-primary-fixed": "#001f24",
              "background": "#101014",
              "tertiary-fixed-dim": "#f2c027",
              "on-tertiary-fixed": "#241a00",
              "surface-container-low": "#1b1b1f",
              "outline-variant": "#3b494c",
              "primary-container": "#00e8ff",
              "outline": "#849396",
              "surface-dim": "#131317",
              "surface-container-high": "#2a292e",
              "on-secondary": "#00363d",
              "surface": "#131317",
              "on-secondary-fixed-variant": "#0b4e56",
              "error-container": "#93000a",
              "on-primary": "#00363d",
              "on-tertiary": "#3e2e00",
              "surface-tint": "#00daf0",
              "surface-container-highest": "#353439",
              "inverse-on-surface": "#303034",
              "inverse-primary": "#006874",
              "primary": "#c9f7ff",
              "surface-container-lowest": "#0e0e12",
              "secondary-fixed-dim": "#97d0d9",
              "on-tertiary-container": "#715700"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .precision-pulse {
            background-image: linear-gradient(90deg, transparent 75%, #101014 75%);
            background-size: 8px 100%;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center selection:bg-primary-container selection:text-on-primary-container overflow-x-hidden relative">
<!-- TopAppBar -->
<header class="absolute top-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-transparent">
<div class="font-['Inter'] font-[900] text-2xl text-on-surface tracking-tighter" style="text-shadow: 0 0 10px rgba(228, 225, 231, 0.2);">
            FIT<span style="color:#00E8FF">/</span>ASSIST
        </div>
<div class="w-8 h-8 rounded-full bg-surface-container-high border border-outline-variant/15 overflow-hidden">
<img alt="close up portrait of a professional athletic coach" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPREdy_TGeEH0E5-ocPE87hGidaV9EPtnr9H1DShf0MNT0CvY-tWtKnxtOvuAnx4D4uZsF0Dx_Nw167iqg2C3fqHSb3AjEQwGsiCwWgJKgAwYe0M4uO9hfUprTxhVnPBOZNcEqW_XcE4MnA3o6ociE1m9CMFg3XvcXA6XPsF5M7J7jJInYLtwLiQW7vRfzZZIYf-xgM4NK7BHw7o8I2yBql9nU_bsmPU-OWmGboWBSI2FQMv-LyKmzHK05IqqGn5aHN7FdAHqVy5M"/>
</div>
</header>
<main class="w-full max-w-md px-4 flex flex-col justify-center min-h-screen gap-10">
<!-- Hero Identity -->
<div class="space-y-2 text-center">
<h1 class="text-3xl font-black text-on-surface tracking-tight font-headline">Welcome Back</h1>
<p class="text-secondary text-sm font-medium uppercase tracking-[0.2em]">Ascend to your peak performance</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-[10px] font-bold text-secondary uppercase tracking-widest pl-1">Data Entry / Email</label>
<div class="relative group">
<input class="w-full h-[52px] bg-[#1A1A1E] border border-outline-variant/15 text-on-surface px-4 rounded-xl focus:ring-1 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-outline/40" placeholder="cadet@fitassist.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-[10px] font-bold text-secondary uppercase tracking-widest pl-1">Access Protocol / Password</label>
<div class="relative group">
<input class="w-full h-[52px] bg-[#1A1A1E] border border-outline-variant/15 text-on-surface px-4 pr-12 rounded-xl focus:ring-1 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-outline/40" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary-container transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end">
<a class="text-[10px] font-bold text-secondary-fixed-dim uppercase tracking-wider hover:text-primary-container transition-colors" href="#">Forgot Credentials?</a>
</div>
<!-- Primary CTA -->
<button class="w-full h-[52px] bg-primary-container text-on-primary-container font-black uppercase tracking-widest rounded-xl shadow-[0_0_20px_rgba(0,232,255,0.2)] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                Sign In
                <span class="material-symbols-outlined text-sm">bolt</span>
</button>
</form>
<!-- Toggle Link -->
<div class="text-center">
<p class="text-outline text-sm font-medium">
                Don't have an account? 
                <a class="text-primary-container font-bold hover:underline underline-offset-4 ml-1" href="#">Sign Up</a>
</p>
</div>
<!-- Data Visualization -->
<div class="p-4 rounded-xl bg-surface-container-low border border-outline-variant/10 relative overflow-hidden group">
<div class="absolute inset-0 precision-pulse opacity-10"></div>
<div class="relative z-10 flex justify-between items-center">
<div>
<div class="text-[10px] text-outline font-black uppercase tracking-tighter">System Status</div>
<div class="text-xs text-primary-container font-bold">READY FOR DEPLOYMENT</div>
</div>
<div class="h-2 w-24 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-[65%] shadow-[0_0_10px_#00e8ff]"></div>
</div>
</div>
</div>
</main>
<!-- Decorative Gradient Background Elements -->
<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-secondary-container/10 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
