<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "surface-container": "#1f1f23",
                "on-error-container": "#ffdad6",
                "on-primary-container": "#001f24",
                "on-surface": "#e4e1e7",
                "primary-fixed-dim": "#00daf0",
                "on-secondary-container": "#89c2cb",
                "secondary": "#97d0d9",
                "secondary-container": "#105159",
                "surface-bright": "#39393d",
                "tertiary-container": "#ffcc34",
                "tertiary-fixed": "#ffdf92",
                "surface-variant": "#353439",
                "on-tertiary-fixed-variant": "#594400",
                "on-surface-variant": "#bac9cc",
                "on-error": "#690005",
                "inverse-surface": "#e4e1e7",
                "tertiary": "#ffedc8",
                "secondary-fixed": "#b3ecf6",
                "error": "#ffb4ab",
                "on-secondary-fixed": "#001f24",
                "on-primary-fixed-variant": "#004f57",
                "on-background": "#e4e1e7",
                "primary-fixed": "#95f1ff",
                "on-primary-fixed": "#001f24",
                "background": "#101014",
                "tertiary-fixed-dim": "#f2c027",
                "on-tertiary-fixed": "#241a00",
                "surface-container-low": "#1b1b1f",
                "outline-variant": "#3b494c",
                "primary-container": "#00E8FF",
                "outline": "#849396",
                "surface-dim": "#131317",
                "surface-container-high": "#2a292e",
                "on-secondary": "#00363d",
                "surface": "#131317",
                "on-secondary-fixed-variant": "#0b4e56",
                "error-container": "#93000a",
                "on-primary": "#00363d",
                "on-tertiary": "#3e2e00",
                "surface-tint": "#00daf0",
                "surface-container-highest": "#353439",
                "inverse-on-surface": "#303034",
                "inverse-primary": "#006874",
                "primary": "#c9f7ff",
                "surface-container-lowest": "#0e0e12",
                "secondary-fixed-dim": "#97d0d9",
                "on-tertiary-container": "#715700"
              },
              fontFamily: {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
            },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .precision-pulse {
          background-image: linear-gradient(90deg, transparent 75%, #101014 75%);
          background-size: 8px 100%;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- Header Section -->
<header class="w-full bg-background/80 backdrop-blur-xl border-b border-white/5 px-6 py-5">
<div class="flex items-center justify-between max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<span class="text-2xl font-black tracking-tighter text-on-surface">FIT<span class="text-[#00E8FF]">/</span>ASSIST</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">help_outline</span>
</button>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 py-8">
<div class="w-full max-w-md">
<!-- Header Section -->
<div class="mb-10">
<h1 class="text-[32px] font-bold text-on-surface tracking-tight mb-2">Let's Get Started</h1>
<p class="text-secondary text-xs font-label tracking-widest uppercase">Join the kinetic observatory</p>
</div>
<!-- Registration Form -->
<form class="space-y-6">
<div class="space-y-5">
<!-- Input Group: First Name -->
<div class="group">
<label class="block text-[10px] font-medium uppercase tracking-[0.08em] text-on-surface-variant mb-2 ml-1">First Name</label>
<input class="w-full h-[52px] px-4 bg-[#1A1A1E] border border-white/10 rounded-xl text-on-surface placeholder:text-outline/50 focus:outline-none focus:border-[#00E8FF] focus:ring-1 focus:ring-[#00E8FF]/20 transition-all" placeholder="Enter your name" type="text"/>
</div>
<!-- Input Group: Email -->
<div class="group">
<label class="block text-[10px] font-medium uppercase tracking-[0.08em] text-on-surface-variant mb-2 ml-1">Email</label>
<input class="w-full h-[52px] px-4 bg-[#1A1A1E] border border-white/10 rounded-xl text-on-surface placeholder:text-outline/50 focus:outline-none focus:border-[#00E8FF] focus:ring-1 focus:ring-[#00E8FF]/20 transition-all" placeholder="name@example.com" type="email"/>
</div>
<!-- Input Group: Password -->
<div class="group">
<label class="block text-[10px] font-medium uppercase tracking-[0.08em] text-on-surface-variant mb-2 ml-1">Password</label>
<div class="relative">
<input class="w-full h-[52px] px-4 bg-[#1A1A1E] border border-white/10 rounded-xl text-on-surface placeholder:text-outline/50 focus:outline-none focus:border-[#00E8FF] focus:ring-1 focus:ring-[#00E8FF]/20 transition-all" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline/50 cursor-pointer">visibility</span>
</div>
</div>
<!-- Input Group: Confirm Password -->
<div class="group">
<label class="block text-[10px] font-medium uppercase tracking-[0.08em] text-on-surface-variant mb-2 ml-1">Confirm Password</label>
<input class="w-full h-[52px] px-4 bg-[#1A1A1E] border border-white/10 rounded-xl text-on-surface placeholder:text-outline/50 focus:outline-none focus:border-[#00E8FF] focus:ring-1 focus:ring-[#00E8FF]/20 transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary CTA -->
<div class="pt-4">
<button class="w-full h-14 bg-[#00E8FF] text-[#001f24] font-black uppercase tracking-widest rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(0,232,255,0.3)]" type="submit">
                    Create Account
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
<!-- Toggle Link -->
<p class="text-center text-outline text-sm font-label tracking-tight">
                Already have an account? 
                <a class="text-[#00E8FF] font-bold ml-1 hover:underline transition-all" href="#">Sign In</a>
</p>
</form>
<!-- Visual Element: The Precision Pulse -->
</div>
</main>
<!-- Background Decorative Visual -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-[#00E8FF]/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-[#105159]/10 rounded-full blur-[100px]"></div>
</div>
</body></html>
