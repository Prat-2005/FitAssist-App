<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#131317",
            "surface-tint": "#00daf0",
            "error-container": "#93000a",
            "tertiary-fixed-dim": "#f2c027",
            "background": "#131317",
            "on-primary-fixed-variant": "#004f57",
            "on-surface": "#e4e1e7",
            "inverse-surface": "#e4e1e7",
            "primary-container": "#00e8ff",
            "on-primary": "#00363d",
            "surface-container-highest": "#353439",
            "primary-fixed": "#95f1ff",
            "outline": "#849396",
            "on-secondary-container": "#89c2cb",
            "on-background": "#e4e1e7",
            "tertiary": "#ffedc8",
            "surface-dim": "#131317",
            "on-secondary-fixed-variant": "#0b4e56",
            "on-error-container": "#ffdad6",
            "secondary-container": "#105159",
            "primary-fixed-dim": "#00daf0",
            "on-primary-container": "#00646f",
            "surface-container-lowest": "#0e0e12",
            "tertiary-fixed": "#ffdf92",
            "on-error": "#690005",
            "surface-bright": "#39393d",
            "on-primary-fixed": "#001f24",
            "secondary": "#97d0d9",
            "tertiary-container": "#ffcc34",
            "on-surface-variant": "#bac9cc",
            "on-tertiary-container": "#715700",
            "surface-container-high": "#2a292e",
            "surface-container-low": "#1b1b1f",
            "on-secondary-fixed": "#001f24",
            "inverse-primary": "#006874",
            "outline-variant": "#3b494c",
            "surface-container": "#1f1f23",
            "surface-variant": "#353439",
            "secondary-fixed-dim": "#97d0d9",
            "on-tertiary-fixed-variant": "#594400",
            "inverse-on-surface": "#303034",
            "secondary-fixed": "#b3ecf6",
            "on-secondary": "#00363d",
            "on-tertiary": "#3e2e00",
            "primary": "#c9f7ff",
            "error": "#ffb4ab",
            "on-tertiary-fixed": "#241a00"
          },
          fontFamily: {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .precision-pulse {
      background-image: linear-gradient(90deg, transparent 75%, #131317 75%);
      background-size: 8px 100%;
    }
    .glass-card {
      backdrop-filter: blur(12px);
      background-color: rgba(31, 31, 35, 0.6);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- Progress Indicator Section -->
<header class="pt-12 px-6 flex flex-col items-center gap-8">
<div class="flex gap-3">
<!-- Active Dot -->
<div class="w-2.5 h-2.5 rounded-full bg-primary-container shadow-[0_0_12px_rgba(0,232,255,0.6)]"></div>
<!-- Inactive Dots -->
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
</div>
<h1 class="text-[22px] font-bold text-on-surface tracking-tight text-center">
      What's your goal?
    </h1>
</header>
<!-- Selection Grid -->
<main class="flex-grow px-6 pt-10 pb-32">
<div class="grid grid-cols-2 gap-4 max-w-md mx-auto">
<!-- Option: Weight Loss (Active State Example) -->
<button class="relative flex flex-col items-start justify-between p-5 h-44 rounded-xl border-2 border-primary-container bg-primary-container/10 glass-card transition-all duration-200 scale-98 text-left group">
<div class="w-full flex justify-end">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div>
<span class="material-symbols-outlined text-primary-container mb-3 text-3xl" data-icon="weight">weight</span>
<p class="text-on-surface font-bold text-lg leading-tight">Weight Loss</p>
</div>
</button>
<!-- Option: Muscle Gain -->
<button class="relative flex flex-col items-start justify-between p-5 h-44 rounded-xl border border-outline-variant/15 glass-card bg-surface-container hover:bg-surface-container-high transition-all duration-200 active:scale-95 text-left group">
<div class="w-full flex justify-end opacity-0 group-hover:opacity-30">
<span class="material-symbols-outlined text-on-surface-variant">circle</span>
</div>
<div>
<span class="material-symbols-outlined text-secondary mb-3 text-3xl" data-icon="fitness_center">fitness_center</span>
<p class="text-on-surface font-bold text-lg leading-tight">Muscle Gain</p>
</div>
</button>
<!-- Option: General Fitness -->
<button class="relative flex flex-col items-start justify-between p-5 h-44 rounded-xl border border-outline-variant/15 glass-card bg-surface-container hover:bg-surface-container-high transition-all duration-200 active:scale-95 text-left group">
<div class="w-full flex justify-end opacity-0 group-hover:opacity-30">
<span class="material-symbols-outlined text-on-surface-variant">circle</span>
</div>
<div>
<span class="material-symbols-outlined text-secondary mb-3 text-3xl" data-icon="monitor_heart">monitor_heart</span>
<p class="text-on-surface font-bold text-lg leading-tight">General Fitness</p>
</div>
</button>
<!-- Option: Flexibility -->
<button class="relative flex flex-col items-start justify-between p-5 h-44 rounded-xl border border-outline-variant/15 glass-card bg-surface-container hover:bg-surface-container-high transition-all duration-200 active:scale-95 text-left group">
<div class="w-full flex justify-end opacity-0 group-hover:opacity-30">
<span class="material-symbols-outlined text-on-surface-variant">circle</span>
</div>
<div>
<span class="material-symbols-outlined text-secondary mb-3 text-3xl" data-icon="self_improvement">self_improvement</span>
<p class="text-on-surface font-bold text-lg leading-tight">Flexibility</p>
</div>
</button>
</div>
<!-- Decorative Background Image -->
<div class="mt-12 opacity-20 flex justify-center">
<div class="w-64 h-64 rounded-full overflow-hidden blur-3xl mix-blend-screen bg-gradient-to-tr from-primary-container/40 to-transparent"></div>
</div>
</main>
<!-- Fixed Bottom CTA -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface via-surface to-transparent pt-12">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary-container text-on-primary-container font-black text-sm tracking-widest py-5 rounded-lg uppercase shadow-[0_8px_30px_rgb(0,232,255,0.2)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        Continue
        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</footer>
<!-- Precision Background Texture (Decorative) -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px]"></div>
<!-- Pulse Bars (Signature Component) -->
<div class="absolute bottom-32 left-0 right-0 h-0.5 precision-pulse opacity-10"></div>
<div class="absolute top-24 left-0 right-0 h-0.5 precision-pulse opacity-5"></div>
</div>
</body></html>
