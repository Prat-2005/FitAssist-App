<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitAssist - Generating Your Plan</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        extend: {
          colors: {

            "on-secondary-container": "#89c2cb",

            "surface-bright": "#39393d",
            "tertiary-container": "#ffcc34",
            "tertiary-fixed": "#ffdf92",
            "surface-variant": "#353439",
            "on-tertiary-fixed-variant": "#594400",
            "on-surface-variant": "#bac9cc",
            "on-error": "#690005",
            "inverse-surface": "#e4e1e7",
            "tertiary": "#ffedc8",
            "secondary-fixed": "#b3ecf6",
            "error": "#ffb4ab",
            "on-secondary-fixed": "#001f24",
            "on-primary-fixed-variant": "#004f57",
            "on-background": "#e4e1e7",
            "primary-fixed": "#95f1ff",
            "on-primary-fixed": "#001f24",
            "background": "#131317",
            "tertiary-fixed-dim": "#f2c027",
            "on-tertiary-fixed": "#241a00",
            "surface-container-low": "#1b1b1f",
            "outline-variant": "#3b494c",

            "outline": "#849396",
            "surface-dim": "#131317",
            "surface-container-high": "#2a292e",

            "surface": "#131317",
            "on-secondary-fixed-variant": "#0b4e56",
            "error-container": "#93000a",
            "on-primary": "#00363d",
            "on-tertiary": "#3e2e00",
            "surface-tint": "#00daf0",
            "surface-container-highest": "#353439",
            "inverse-on-surface": "#303034",
            "inverse-primary": "#006874",
            "primary": "#c9f7ff",
            "surface-container-lowest": "#0e0e12",

            "on-tertiary-container": "#715700"

          fontFamily: {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},

<style>
    @keyframes spin-custom {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-custom {
      animation: spin-custom 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .neon-glow {
      box-shadow: 0 0 20px rgba(0, 232, 255, 0.4), inset 0 0 10px rgba(0, 232, 255, 0.2);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-[#131317] font-body text-on-surface antialiased overflow-hidden">
<!-- TopAppBar (Suppressed context check: This is a linear/transactional loading state, but brand identity is maintained for anchoring) -->
<header class="fixed top-0 w-full z-50 bg-[#131317]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full shadow-[0px_4px_30px_rgba(0,0,0,0.4)]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#00E8FF] opacity-50">menu</span>
<h1 class="text-xl font-['Inter'] font-black text-[#00E8FF] tracking-widest uppercase text-white tracking-tighter">FIT<span class="text-[#00E8FF]">/</span>ASSIST</h1>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-high border border-outline-variant/15 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-sm">person</span>
</div>
</header>
<!-- Main Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center px-6">
<!-- Background Texture -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none opacity-20">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-secondary-container/10 blur-[100px] rounded-full"></div>
</div>
<!-- Central Loading Module -->
<div class="relative z-10 flex flex-col items-center text-center">
<!-- Neon Precision Spinner (80dp) -->
<div class="relative w-20 h-20 mb-12">
<!-- Static track -->
<div class="absolute inset-0 rounded-full border-4 border-surface-container-high"></div>
<!-- Animated spinner head -->
<div class="absolute inset-0 rounded-full border-4 border-t-primary-container border-r-transparent border-b-transparent border-l-transparent animate-spin-custom neon-glow"></div>
<!-- Center point -->
<div class="absolute inset-[34%] bg-primary-container/20 rounded-sm backdrop-blur-sm"></div>
</div>
<!-- Iterative Message Section -->
<div class="space-y-4">
<h2 class="text-base italic font-medium text-secondary tracking-wide uppercase">
          Analysing your profile...
        </h2>
<!-- Precision Pulse (Design System Signature Component) -->
<div class="w-48 h-1 bg-surface-container-high overflow-hidden mx-auto rounded-full">
<div class="h-full bg-primary-container w-2/3 relative">
<!-- Pattern overlap to mimic telemetry scale -->
<div class="absolute inset-0 bg-[linear-gradient(90deg,transparent_0px,transparent_6px,#131317_6px,#131317_8px)] bg-[length:8px_100%] opacity-40"></div>
</div>
</div>
<p class="text-[12px] font-medium text-outline uppercase tracking-[0.15em]">
          This may take up to 10 seconds
        </p>
</div>
</div>
<!-- Data Telemetry Decoration (Asymmetric Layout) -->
<div class="absolute bottom-24 left-12 hidden md:block opacity-40">
<div class="text-[10px] font-['Inter'] font-bold text-outline-variant uppercase tracking-widest space-y-2">
<div class="flex gap-2 items-center"><span class="w-1 h-1 bg-primary-container"></span> CALCULATING CALORIC BASELINE</div>
<div class="flex gap-2 items-center"><span class="w-1 h-1 bg-outline-variant"></span> OPTIMIZING MACRO RATIOS</div>
<div class="flex gap-2 items-center"><span class="w-1 h-1 bg-outline-variant"></span> SEQUENCING WORKOUT BLOCKS</div>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed: Linear Task Focus) -->
<!-- The navigation shell is excluded as per the "Destination Rule" since this is a focused loading state -->
</body></html>
