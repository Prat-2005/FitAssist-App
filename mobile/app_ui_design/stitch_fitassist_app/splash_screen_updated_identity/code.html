<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .precision-pulse {
            background-image: repeating-linear-gradient(
                to right,
                #00e8ff,
                #00e8ff 6px,
                transparent 6px,
                transparent 8px
            );
        }
        .kinetic-void {
            background: radial-gradient(circle at 50% 50%, #1b1b1f 0%, #101014 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center kinetic-void">
<!-- Decorative Background Element: Subtle Glow -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-[400px] h-[400px] bg-primary-container opacity-5 blur-[120px] rounded-full"></div>
</div>
<!-- Content Shell -->
<div class="relative z-10 flex flex-col items-center gap-6">
<!-- Logo Module -->
<div class="flex flex-col items-center group">
<!-- Precision Pulse Accent (Above Wordmark) -->
<div class="w-12 h-1 mb-8 precision-pulse opacity-40"></div>
<!-- Fit/Assist Wordmark Update -->
<h1 class="font-black text-2xl tracking-tighter leading-none uppercase" style="text-shadow: 0 0 8px rgba(0, 232, 255, 0.4);">
<span class="text-white">FIT</span><span class="text-[#00E8FF]">/</span><span class="text-white">ASSIST</span>
</h1>
<!-- Tagline Update: "TRAIN SMARTER. NOT HARDER." -->
<div class="mt-4 flex items-center gap-3">
<span class="h-px w-6 bg-primary-container opacity-30"></span>
<p class="text-[#00E8FF] font-medium text-[16px] tracking-[0.15em] uppercase font-label">
                    TRAIN SMARTER. NOT HARDER.
                </p>
<span class="h-px w-6 bg-primary-container opacity-30"></span>
</div>
</div>
<!-- Loading Indicator / Precision Readout -->
<div class="mt-16 flex flex-col items-center gap-4">
<div class="w-48 h-[2px] bg-outline-variant/20 relative overflow-hidden">
<div class="absolute inset-y-0 left-0 w-1/3 bg-primary-container shadow-[0_0_15px_rgba(0,232,255,0.8)]"></div>
</div>
<p class="font-label text-[10px] text-secondary tracking-[0.2em] uppercase opacity-50">
                System Calibration In Progress
            </p>
</div>
</div>
<!-- Asymmetric Performance Overlay (Decorative) -->
<div class="absolute bottom-12 left-12 hidden md:block">
<div class="flex flex-col gap-1 border-l border-primary-container/20 pl-4">
<span class="text-[10px] font-label text-primary-container/40">LATENCY: 0.04MS</span>
<span class="text-[10px] font-label text-primary-container/40">VERSION: 4.0.2-KINETIC</span>
</div>
</div>
<div class="absolute top-12 right-12 hidden md:block opacity-20">
<div class="flex flex-col items-end">
<span class="material-symbols-outlined text-primary-container text-4xl">radar</span>
</div>
</div>
</main>
